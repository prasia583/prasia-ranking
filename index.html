<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>프라시아 결사 랭킹</title>

<style>
body{
  font-family:Arial;
  background:#0b0f17;
  color:white;
  padding:30px
}

table{ border-collapse:collapse; width:100% }
th,td{ border:1px solid #333; padding:8px }
th{ background:#111a2a }

select,input{ padding:6px; margin:5px }

/* ✅ 이 줄들이 반드시 style 안에 있어야 함 */
.delta-up { color:#ff4d4d; font-weight:800; }
.delta-down { color:#4aa3ff; font-weight:800; }
.delta-flat { color:#c7c7c7; font-weight:700; }
.delta-cell { white-space:nowrap; }
</style>

</head>

<body>

<h1>프라시아 결사 랭킹</h1>

날짜
<select id="date"></select>

검색
<input id="search">

<table>

<thead>
  <tr>
   <th>변동</th>
<th>순위</th>
<th>결사</th>
<th>서버</th>
<th>총점</th>
<th>기존대비</th>
  </tr>
</thead>

<tbody id="rank"></tbody>

</table>

<script src="./app.js"></script>

</body>
</html>
