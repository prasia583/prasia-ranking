<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>프라시아 결사 랭킹</title>
  <style>
    body{
      font-family: Arial;
      background:#0b0f17;
      color:white;
      padding:30px
    }
    table{ border-collapse:collapse; width:100% }
    th,td{ border:1px solid #333; padding:8px }
    th{ background:#111a2a }
    select,input{ padding:6px; margin:5px }
    .muted{ color:#9bb0d0; font-size:12px }
  </style>
</head>
<body>
  <h1>프라시아 결사 랭킹</h1>

  <div class="muted">
    status: <span id="status">-</span> /
    file: <span id="current">-</span> /
    <span id="count">0 rows</span>
  </div>

  <div style="margin-top:12px">
    날짜
    <select id="date"></select>

    검색
    <input id="search" placeholder="랭크/서버/결사 검색" />
  </div>

  <table style="margin-top:12px">
    <thead>
      <tr>
        <th>랭크</th>
        <th>서버</th>
        <th>결사</th>
        <th>사냥점수</th>
        <th>레벨점수</th>
        <th>총점</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>

  <!-- ✅ 여기 절대 /app.js 쓰지 말고 ./app.js -->
  <script src="./app.js"></script>
</body>
</html>
