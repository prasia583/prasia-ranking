<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<title>프라시아 결사 랭킹</title>

<style>
/* ====== Layout ====== */
body{
  font-family: Arial, system-ui, -apple-system, "Noto Sans KR", sans-serif;
  background:#0b0f17;
  color:#fff;
  padding:20px;
  max-width:1180px;
  margin:0 auto;
}

h1{
  margin: 0 0 12px 0;
  font-size: 32px;
  font-weight: 800;
}

/* ====== Controls ====== */
.controls{
  display:flex;
  gap:10px;
  align-items:center;
  flex-wrap:wrap;
  margin-bottom:10px;
}
.controls label{
  font-size:13px;
  opacity:.9;
}
select,input,button{
  padding:6px 8px;
  border-radius:6px;
  border:1px solid #2a3550;
  background:#0f1626;
  color:#fff;
  outline:none;
}
input::placeholder{ color:#8fa3c7; }

button{
  cursor:pointer;
  font-weight:700;
}
button:hover{
  background:#15203a;
}

.searchForm{
  display:flex;
  gap:8px;
  align-items:center;
}

/* ====== Pager ====== */
.pager{
  display:flex;
  gap:8px;
  align-items:center;
  justify-content:flex-end;
  margin:10px 0;
  flex-wrap:wrap;
}
.pager .info{
  font-size:12px;
  opacity:.85;
  margin-right:auto;
}
.pager button{
  padding:6px 10px;
  border-radius:8px;
  border:1px solid #2a3550;
  background:#0f1626;
  color:#fff;
  cursor:pointer;
  font-weight:800;
}
.pager button:hover{ background:#15203a; }
.pager button:disabled{ opacity:.4; cursor:not-allowed; }
.pager .page{
  min-width:46px;
  text-align:center;
  font-variant-numeric: tabular-nums;
}
.pager .size{
  display:flex;
  gap:6px;
  align-items:center;
}
.pager .size label{
  font-size:12px;
  opacity:.85;
}

/* ✅ 숫자 페이지 버튼 영역 */
.pager .nums{
  display:flex;
  gap:6px;
  align-items:center;
  flex-wrap:wrap;
  justify-content:center;
  flex: 1 1 auto;
}
.pager .nums button{
  padding:6px 10px;
  min-width:38px;
}
.pager .nums button.active{
  background:#1b2a4a;
  border-color:#3a5485;
}

/* ====== Table ====== */
table{
  border-collapse:collapse;
  width:100%;
  table-layout:fixed;
  font-size:13px;
}

thead th{
  background:#111a2a;
  position: sticky;
  top: 0;
  z-index: 1;
}

th,td{
  border:1px solid #2a3550;
  padding:5px 8px;
  line-height:1.15;
}

tbody tr:hover{
  background:rgba(255,255,255,0.04);
}

/* ====== Column widths ====== */
th:nth-child(1), td:nth-child(1){ width:62px;  text-align:center; }
th:nth-child(2), td:nth-child(2){ width:58px;  text-align:center; }
th:nth-child(3), td:nth-child(3){ width:220px; }
th:nth-child(4), td:nth-child(4){ width:110px; }
th:nth-child(5), td:nth-child(5){ width:95px;  text-align:right; }
th:nth-child(6), td:nth-child(6){ width:105px; text-align:right; }

td:nth-child(3),
td:nth-child(4){
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

td:nth-child(5),
td:nth-child(6){
  font-variant-numeric: tabular-nums;
  white-space:nowrap;
}

/* ====== Delta styles ====== */
.delta-up   { color:#ff4d4d; font-weight:800; }
.delta-down { color:#4aa3ff; font-weight:800; }
.delta-flat { color:#c7c7c7; font-weight:700; }
.delta-cell { white-space:nowrap; }

@media (max-width: 720px){
  body{ padding:12px; max-width: 100%; }
  h1{ font-size:24px; }
  th,td{ padding:5px 6px; }
  th:nth-child(3), td:nth-child(3){ width:180px; }
  .searchForm{ width:100%; }
  #search{ flex:1; min-width: 160px; }
}
  /* ====== 길드 상세 모달(팝업) 표 글씨/정렬 강화 ====== */

/* 모달 전체 글씨 크게 */
#guildModal .gm-card,
#guildModal .gm-body,
#guildModal .gm-body *{
  font-size: 16px;   /* 기본 16 */
  line-height: 1.35;
}

/* 제목/서브텍스트 더 크게 */
#gmTitle{ font-size: 22px; font-weight: 900; }
#gmSub  { font-size: 16px; opacity: .9; }

/* 표 자체 크게 + 여백 확 */
#guildModal table{
  font-size: 16px;
}
#guildModal th,
#guildModal td{
  padding: 10px 12px !important;
}

/* 헤더 더 눈에 띄게 */
#guildModal thead th{
  font-size: 15px;
  font-weight: 900;
}

/* ✅ 인원 컬럼(두 번째 컬럼) 가운데 정렬 */
#guildModal table th:nth-child(2),
#guildModal table td:nth-child(2){
  text-align: center !important;
}

/* 첫 컬럼(직업/등급)은 왼쪽 유지 */
#guildModal table th:nth-child(1),
#guildModal table td:nth-child(1){
  text-align: left !important;
}

/* 표 영역도 살짝 넓게 보이게 */
#guildModal .gm-cols{
  gap: 16px;
}
</style>
</head>

<body>

<h1>프라시아 결사 랭킹</h1>

<div class="controls">
  <label>날짜</label>
  <select id="date"></select>

  <label>검색</label>
  <form class="searchForm" id="searchForm" onsubmit="return false;">
    <input id="search" placeholder="결사 / 서버 검색" autocomplete="off">
    <button type="button" id="btnSearch">검색</button>
    <button type="button" id="btnClear">초기화</button>
  </form>
</div>

<!-- ✅ pager: 페이지당 드롭다운 + 숫자 버튼 포함 -->
<div class="pager" id="pager">
  <div class="info" id="pagerInfo"></div>

  <div class="size">
    <label for="pageSize">페이지당</label>
    <select id="pageSize">
      <option value="50">50</option>
      <option value="100" selected>100</option>
      <option value="200">200</option>
    </select>
  </div>

  <button id="btnFirst" type="button">처음</button>
  <button id="btnPrev" type="button">이전</button>

  <!-- ✅ 여기에 1~10 숫자 버튼이 자동으로 생성됨 -->
  <div class="nums" id="pagerNums"></div>

  <div class="page" id="pagerPage"></div>

  <button id="btnNext" type="button">다음</button>
  <button id="btnLast" type="button">마지막</button>
</div>

<table>
  <thead>
    <tr>
      <th>변동</th>
      <th>순위</th>
      <th>결사</th>
      <th>서버</th>
      <th>총점</th>
      <th>기존대비</th>
    </tr>
  </thead>
  <tbody id="rank"></tbody>
</table>

<!-- ✅ 캐시 때문에 v 올림 -->
<script src="./app.js?v=11"></script>
  <!-- ✅ 결사 상세 모달 -->
<div id="guildModal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:9999;">
  <div style="max-width:920px; margin:40px auto; background:#121a27; border:1px solid #23324a; border-radius:14px; padding:14px;">
    <div style="display:flex; align-items:center; justify-content:space-between; gap:10px;">
      <div>
        <div id="gmTitle" style="font-size:18px; font-weight:900;"></div>
        <div id="gmSub" style="font-size:12px; opacity:.8; margin-top:2px;"></div>
      </div>
      <button type="button" id="gmClose" style="padding:8px 10px; border-radius:10px;">닫기</button>
    </div>

    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:12px;">
      <div style="background:#0f1626; border:1px solid #23324a; border-radius:12px; padding:10px;">
        <div style="font-weight:900; margin-bottom:8px;">직업 분포</div>
        <div id="gmClass"></div>
      </div>

      <div style="background:#0f1626; border:1px solid #23324a; border-radius:12px; padding:10px;">
        <div style="font-weight:900; margin-bottom:8px;">토벌등급 분포</div>
        <div id="gmGrade"></div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
